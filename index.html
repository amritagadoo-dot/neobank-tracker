<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neobank App Ratings</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6faf6;
      color: #1f2a1f;
      margin: 0;
      padding: 32px 20px;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }
    h1 {
      margin-bottom: 8px;
    }
    .muted {
      color: #5f6b5f;
      margin-bottom: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }
    .card {
      background: white;
      border: 1px solid #d9e5d9;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.05);
    }
    .category {
      color: #647264;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .score {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Neobank App Ratings</h1>
    <p class="muted">Live page powered by ratings.json</p>

    <p id="lastUpdated" class="muted"></p>

    <div id="appGrid" class="grid"></div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
